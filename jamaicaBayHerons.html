  <g id="copy">
    <text class="st15" transform="translate(1682.93 623.92)"><tspan x="0" y="0">The great blue heron is a year-round resident of NYC.</tspan><tspan x="-28.3" y="78">They are considered a protected bird in New York State.</tspan><tspan x="-45.82" y="156">The Lenape people who once lived in Brooklyn called the</tspan><tspan x="-10.81" y="234">great blue heron the same name as the word for bridge.</tspan><tspan x="-65.73" y="312">To the Lenape, the great blue heron was a mystical creature</tspan><tspan x="27.45" y="390" xml:space="preserve">that bridged the earth and the spirit world.  The bird</tspan><tspan x="59.08" y="468">symbolized wisdom, patience, and good fortune. </tspan></text>
  </g>
